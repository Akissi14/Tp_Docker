name: CI devops 2025
on:
  # Déclenchement sur les branches principales
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Installation de l'environnement Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Distribution OpenJDK recommandée
          cache: 'maven' # Optimise la vitesse des builds suivants

      # Build, tests et analyse de qualité
      # 2-1: Testcontainers permet de lancer des conteneurs Docker (ex: Postgres) 
      # directement pendant les tests pour simuler un environnement réel.
      - name: Build and test with Maven and Sonar
        run: |
          mvn -B verify sonar:sonar \
          -Dsonar.projectKey=Akissi14_Tp_Docker \
          -Dsonar.organization=akissi14-org \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          --file backend/pom.xml

  build-and-push-docker-image:
    # 2-3: 'needs' garantit que l'image n'est construite QUE si les tests passent.
    # On ne veut pas pusher une application cassée en production.
    needs: test-backend
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 2-2: Utilisation de secrets pour masquer les identifiants DockerHub 
      # afin d'éviter les vols de compte (sécurité critique).
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # 2-4: Pusher les images permet de les rendre disponibles partout (cloud, serveurs)
      # sans avoir besoin de recompiler le code à chaque fois.
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-backend:latest
          push: ${{ github.ref == 'refs/heads/main' }} # On push seulement depuis la branche main

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./httpd
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}